<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM con Bootstrap</title>
    <script src="js/ejercicio18.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        
                        <h2 class="card-title text-center mb-4 text-primary fw-bold">
                            Lista Dinámica
                        </h2>
                        
                        <div class="input-group mb-4">
                            <input type="text" id="nuevoElemento" class="form-control" placeholder="Escribe una nueva tarea..." aria-label="Nuevo elemento">
                            <button id="agregarBtn" class="btn btn-primary" type="button">
                                <i class="bi bi-plus-circle"></i> Agregar
                            </button>
                        </div>

                        <ul id="lista" class="list-group">
                            </ul>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
