<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - Convertidor de Celsius a Fahrenheit</title>
    <script src="js/ejercicio10.js"></script>
</head>
<body>
    <h1>Convertidor de Celsius a Fahrenheit</h1>
    
    <label for="celsius">Ingrese la temperatura en Celsius:</label>
    <input type="number" id="celsius" placeholder="Ej. 25">
    <br>
    
    <button onclick="convertirTemperatura()">Convertir</button>
    <br>
    
    <label for="resultado">Resultado en Fahrenheit:</label>
    <input type="text" id="resultado" readonly placeholder="Esperando conversión...">
</body>
