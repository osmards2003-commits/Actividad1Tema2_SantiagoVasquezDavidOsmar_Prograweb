<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11 - Convertidor de Kilometros a millas</title>
    <script src="js/ejercicio11.js"></script>
</head>
<body>
    <h1>Convertidor de Kilometros a millas</h1>
    
    <label for="kilometros">Ingrese la distancia en Kilometros:</label>
    <input type="number" id="kilometros" placeholder="Ej. 10" required>
    <br>
    
    <button onclick="convertirDistancia()">Convertir</button>
    <br>
    
    <label for="resultado">Resultado en Millas:</label>
    <input type="text" id="resultado" readonly placeholder="Esperando conversión...">
</body>
</html>
