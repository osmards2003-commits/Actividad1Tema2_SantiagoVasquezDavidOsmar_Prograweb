<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 12 - Convertidor de Pesos Mexicanos a Dolares</title>
    <script src="js/ejercicio12.js"></script>
</head>
<body>
    <h1>Convertidor de Pesos Mexicanos a Dolares</h1>
    
    <label for="pesos">Ingrese la cantidad en Pesos Mexicanos:</label>
    <input type="number" id="pesos" placeholder="Ej. 10" required min="0">
    <br>
    
    <button onclick="convertirPesos()">Convertir</button>
    <br>
    
    <label for="resultado">Resultado en Dolares:</label>
    <input type="text" id="resultado" readonly placeholder="Esperando conversión...">
</body>
</html>
