<!DOCTYPE html>
<html>
<head>

    <script src="js/ejercicio14.js"></script>
</head>
<body>
    <h1>Operaciones con arreglos</h1>
    
    <label for="numeros">Ingrese los numeros separados por comas (,):</label>
    <input type="text" id="numeros" placeholder="Ej. 10,20,30,40,50" required >
    <br>
    
    <button onclick="calcular()">Calcular</button>
    <br>
    
    <label for="resultado">Numero mayor:</label>
    <input type="text" id="resultado1" readonly placeholder="Esperando verificacion..."> 
    <label for="resultado">Numero menor:</label> 
    <input type="text" id="resultado2" readonly placeholder="Esperando verificacion..."> 
    <label for="resultado">Promedio:</label>
    <input type="text" id="resultado3" readonly placeholder="Esperando verificacion..."> 
</body>
