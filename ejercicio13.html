<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - Verificador de voto por edad</title>
    <script src="js/ejercicio13.js"></script>
</head>
<body>
    <h1>Verificador de edad para votar</h1>
    
    <label for="edad">Ingrese tu edad:</label>
    <input type="number" id="edad" placeholder="Ej. 10" required min="0">
    <br>
    
    <button onclick="verificarEdad()">Verificar</button>
    <br>
    
    <label for="resultado">¿Puedes votar?:</label>
    <input type="text" id="resultado" readonly placeholder="Esperando verificacion...">
</body>
</html>
