<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 7 - Receta tacos al pastor</title>
</head>
<body>
    <h1>Tacos al Pastor</h1>
    <h2>Ingredientes:</h2>
    <ul>
        <li>Carne de cerdo (500 gr)</li>
        <li>Piña (1 taza)
            <ul>
                <li>Cortada en cubos</li>
            </ul>
        </li>
        <li>Tortillas de maíz</li>
    </ul>
    <h2>Preparación:</h2>
    <ol>
        <li>Marinar la carne por 2 horas.</li>
        <li>Asar a medio fuego.</li>
    </ol>
    <p>¡Sirve con cilantro y cebolla!</p>
</body>
</html>
