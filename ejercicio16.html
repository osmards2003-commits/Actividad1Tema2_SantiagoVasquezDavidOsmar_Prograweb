<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16 - Calculadora</title>
    <script src="js/ejercicio16.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    div class="container">
    <h2>Calculadora Básica</h2>
    
    <div class="form-group">
        <label for="numero1">Número 1:</label>
        <input type="text" id="numero1" placeholder="Ej. 10">
    </div>
    
    <div class="form-group">
        <label for="numero2">Número 2:</label>
        <input type="text" id="numero2" placeholder="Ej. 5">
    </div>

    <div class="buttons">
        <button onclick="calcularOperacion('suma')">+</button>
        <button onclick="calcularOperacion('resta')">-</button>
        <button onclick="calcularOperacion('multiplicacion')">*</button>
        <button onclick="calcularOperacion('division')">/</button>
    </div>

    <div class="form-group">
        <label for="resultado">Resultado:</label>
        <input type="text" id="resultado" readonly style="background-color: #e9ecef; font-weight: bold;">
    </div>
</div>

</body>
</html>
